<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scan QR Aset - OJK Purwokerto</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif; }
  body { background:#0B2545; height:100vh; display:flex; flex-direction:column; }
  header {
    padding:16px; text-align:center; color:#fff;
    font-size:15px; font-weight:700; letter-spacing:0.3px;
  }
  header span { display:block; font-size:11px; font-weight:400; color:#94A3B8; margin-top:2px; }
  #reader-wrap { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
  #reader { width:100%; max-width:480px; }
  #status {
    position:absolute; bottom:24px; left:0; right:0; text-align:center;
    color:#fff; font-size:13px; font-weight:600; padding:0 20px;
  }
  #status.error { color:#F87171; }
  #status.success { color:#4ADE80; }
  footer { padding:16px; display:flex; gap:10px; }
  button {
    flex:1; height:48px; border:none; border-radius:12px; font-size:14px;
    font-weight:700; cursor:pointer; color:#fff;
  }
  #btnClose { background:#334155; }
  #btnManual { background:#C8102E; }
  #manualBox {
    display:none; padding:0 16px 16px; gap:8px; flex-direction:column;
  }
  #manualBox input {
    height:46px; border-radius:10px; border:none; padding:0 14px;
    font-size:16px; text-align:center;
  }
  #manualBox button { background:#134074; }
</style>
</head>
<body>

<header>
  Scan QR Aset
  <span>Arahkan kamera ke label QR pada aset</span>
</header>

<div id="reader-wrap">
  <div id="reader"></div>
  <div id="status">Menyiapkan kamera...</div>
</div>

<div id="zoomBox" style="display:none; align-items:center; gap:10px; padding:0 20px 12px; color:#fff; font-size:12px;">
  <span>🔍−</span>
  <input type="range" id="zoomSlider" style="flex:1;">
  <span>🔍+</span>
</div>

<div id="manualBox">
  <input type="text" id="manualInput" maxlength="5" inputmode="numeric" placeholder="Atau ketik 5 digit manual">
  <button type="button" onclick="kirimManual()">Gunakan nomor ini</button>
</div>

<footer>
  <button id="btnManual" type="button" onclick="toggleManual()">Input Manual</button>
  <button id="btnClose" type="button" onclick="window.close()">Tutup</button>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
  var statusEl = document.getElementById('status');
  var scanner = null;
  var sudahKirim = false;

  function kirimHasil(kode) {
    if (sudahKirim) return;
    sudahKirim = true;
    statusEl.textContent = '✔ Kode terbaca: ' + kode;
    statusEl.className = 'success';

    // Kirim balik ke window Apps Script yang membuka halaman ini.
    // targetOrigin '*' dipakai karena domain deployment Apps Script bisa berbeda-beda
    // (script.google.com / googleusercontent.com); penerima di sisi Apps Script
    // yang memvalidasi bentuk datanya.
    if (window.opener) {
      window.opener.postMessage({ type: 'ASSET_QR_SCANNED', code: kode }, '*');
    }
    if (scanner) { scanner.stop().catch(function(){}); }
    setTimeout(function(){ window.close(); }, 700);
  }

  function siapkanZoom() {
    try {
      var capabilities = scanner.getRunningTrackCameraCapabilities();
      var zoomFeature = capabilities.zoomFeature();
      if (!zoomFeature.isSupported()) return;

      var zoomBox = document.getElementById('zoomBox');
      var slider = document.getElementById('zoomSlider');
      zoomBox.style.display = 'flex';
      slider.min = zoomFeature.min();
      slider.max = zoomFeature.max();
      slider.step = zoomFeature.step();
      slider.value = zoomFeature.value();

      slider.addEventListener('input', function () {
        zoomFeature.apply(parseFloat(slider.value));
      });
    } catch (e) {
      // Zoom tidak didukung perangkat ini, abaikan diam-diam
    }
  }

  function onScanSuccess(decodedText) {
    // Ambil 5 digit terakhir dari isi QR (sesuaikan jika format QR SAP berbeda)
    var digitsOnly = decodedText.replace(/\D/g, '');
    var kode = digitsOnly.slice(-5);
    if (kode.length === 5) {
      kirimHasil(kode);
    }
  }

  function mulaiScanner() {
    // Label aset OJK memakai barcode 1D (Code 128), bukan QR code,
    // jadi scanner difokuskan ke format barcode dan kotak scan dibuat
    // lebar-pendek supaya pas dengan bentuk barcode-nya.
    scanner = new Html5Qrcode('reader', {
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.ITF
      ]
    });
    scanner.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: { width: 280, height: 120 },
        videoConstraints: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          advanced: [{ focusMode: 'continuous' }, { exposureMode: 'continuous' }]
        }
      },
      onScanSuccess,
      function () { /* frame tanpa barcode, abaikan */ }
    ).then(function () {
      siapkanZoom();
      statusEl.textContent = 'Arahkan kamera ke label QR aset';
      statusEl.className = '';
    }).catch(function (err) {
      statusEl.textContent = 'Kamera tidak bisa diakses. Gunakan input manual di bawah.';
      statusEl.className = 'error';
      toggleManual();
    });
  }

  function toggleManual() {
    var box = document.getElementById('manualBox');
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
  }

  function kirimManual() {
    var val = document.getElementById('manualInput').value.trim();
    if (val.length !== 5) {
      alert('Masukkan tepat 5 digit nomor aset');
      return;
    }
    kirimHasil(val);
  }

  window.addEventListener('load', mulaiScanner);
</script>

</body>
</html>
