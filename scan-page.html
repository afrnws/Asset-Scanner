<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scan Kode Aset - OJK Purwokerto</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background:#0B2545; height:100vh; display:flex; flex-direction:column; }
  header { padding:16px; text-align:center; color:#fff; font-size:15px; font-weight:700; }
  header span { display:block; font-size:11px; font-weight:400; color:#94A3B8; margin-top:2px; }

  #reader-wrap { flex:1; position:relative; display:flex; align-items:center; justify-content:center; cursor:crosshair; }
  #reader { width:100%; max-width:480px; }

  #focusRing {
    position:absolute; width:60px; height:60px; border:2px solid #FCDE5A;
    border-radius:50%; pointer-events:none; display:none;
    transform:translate(-50%,-50%);
    animation: focusPulse 0.5s ease-out;
  }
  @keyframes focusPulse {
    0% { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
  }

  #status {
    position:absolute; bottom:16px; left:0; right:0; text-align:center;
    color:#fff; font-size:13px; font-weight:600; padding:0 20px;
  }
  #status.error { color:#F87171; }
  #status.success { color:#4ADE80; }
  #hint {
    position:absolute; top:14px; left:0; right:0; text-align:center;
    color:#94A3B8; font-size:11px; padding:0 20px;
  }

  footer { padding:16px; display:flex; gap:10px; }
  button {
    flex:1; height:48px; border:none; border-radius:12px; font-size:14px;
    font-weight:700; cursor:pointer; color:#fff;
  }
  #btnClose { background:#334155; }
  #btnManual { background:#C8102E; }
  #manualBox { display:none; padding:0 16px 16px; gap:8px; flex-direction:column; }
  #manualBox input { height:46px; border-radius:10px; border:none; padding:0 14px; font-size:16px; text-align:center; }
  #manualBox button { background:#134074; }
</style>
</head>
<body>

<header>
  Scan Kode Aset
  <span>Arahkan kamera ke barcode/QR pada aset</span>
</header>

<div id="reader-wrap">
  <div id="reader"></div>
  <div id="focusRing"></div>
  <div id="hint">Tap layar untuk fokus ulang</div>
  <div id="status">Menyiapkan kamera...</div>
</div>

<div id="manualBox">
  <input type="text" id="manualInput" maxlength="5" inputmode="numeric" placeholder="Atau ketik 5 digit manual">
  <button type="button" onclick="kirimManual()">Gunakan nomor ini</button>
</div>

<footer>
  <button id="btnManual" type="button" onclick="toggleManual()">Input Manual</button>
  <button id="btnClose" type="button" onclick="window.close()">Tutup</button>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
  var statusEl = document.getElementById('status');
  var scanner = null;
  var sudahKirim = false;

  function kirimHasil(kodeAsli) {
    if (sudahKirim) return;
    var digitsOnly = kodeAsli.replace(/\D/g, '');
    var kode = digitsOnly.slice(-5);
    if (kode.length !== 5) return; // hasil bukan angka valid, abaikan & lanjut scan

    sudahKirim = true;
    statusEl.textContent = '✔ Kode terbaca: ' + kode;
    statusEl.className = 'success';

    if (window.opener) {
      window.opener.postMessage({ type: 'ASSET_QR_SCANNED', code: kode }, '*');
    }
    if (scanner) { scanner.stop().catch(function(){}); }
    setTimeout(function(){ window.close(); }, 700);
  }

  function onScanSuccess(decodedText) {
    kirimHasil(decodedText);
  }

  function mulaiScanner() {
    // Tidak dibatasi formatnya (QR maupun barcode 1D apapun langsung dicoba dibaca)
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode:'environment' },
      {
        fps: 15,
        qrbox: { width: 260, height: 150 },
        videoConstraints: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          advanced: [{ focusMode: 'continuous' }, { exposureMode: 'continuous' }]
        }
      },
      onScanSuccess,
      function () { /* frame tanpa kode, abaikan */ }
    ).then(function () {
      statusEl.textContent = 'Arahkan kamera ke kode aset';
      statusEl.className = '';
      aktifkanTapFocus();
    }).catch(function (err) {
      statusEl.textContent = 'Kamera tidak bisa diakses. Gunakan input manual di bawah.';
      statusEl.className = 'error';
      toggleManual();
    });
  }

  // Tap-to-focus: saat user tap layar, kirim titik itu sebagai target fokus
  // ke kamera (didukung sebagian besar HP Android via Chrome, iPhone akan
  // fallback diam-diam ke continuous autofocus bawaan kalau tidak didukung).
  function aktifkanTapFocus() {
    var wrap = document.getElementById('reader-wrap');
    var ring = document.getElementById('focusRing');

    wrap.addEventListener('click', function (e) {
      var rect = wrap.getBoundingClientRect();
      var relX = (e.clientX - rect.left) / rect.width;
      var relY = (e.clientY - rect.top) / rect.height;

      ring.style.left = (e.clientX - rect.left) + 'px';
      ring.style.top = (e.clientY - rect.top) + 'px';
      ring.style.display = 'block';
      ring.style.animation = 'none';
      void ring.offsetWidth;
      ring.style.animation = 'focusPulse 0.5s ease-out';

      try {
        var track = scanner.getRunningTrackCameraCapabilities
          ? scanner.getRunningTrackCameraCapabilities()._track
          : null;
        var videoEl = document.querySelector('#reader video');
        var streamTrack = videoEl && videoEl.srcObject
          ? videoEl.srcObject.getVideoTracks()[0]
          : null;

        if (streamTrack) {
          streamTrack.applyConstraints({
            advanced: [{ pointsOfInterest: [{ x: relX, y: relY }] }, { focusMode: 'continuous' }]
          }).catch(function(){ /* tidak didukung perangkat ini, abaikan */ });
        }
      } catch (e) { /* abaikan kalau API tidak tersedia */ }
    });
  }

  function toggleManual() {
    var box = document.getElementById('manualBox');
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
  }

  function kirimManual() {
    var val = document.getElementById('manualInput').value.trim();
    if (val.length !== 5) { alert('Masukkan tepat 5 digit nomor aset'); return; }
    kirimHasil(val);
  }

  window.addEventListener('load', mulaiScanner);
</script>

</body>
</html>
